services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vinur
      POSTGRES_PASSWORD: vinur
      POSTGRES_DB: vinur
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vinur -d vinur"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./server
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_URL: postgres://vinur:vinur@db:5432/vinur
      JWT_SECRET: vinur-dev-secret-change-in-production
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
